    // ==========================================
    // 3. 狀態管理與洗牌邏輯
    // ==========================================
    function shuffleArray(array) {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    }

    const initialState = {
      status: 'start', // 'start' | 'quiz' | 'result' | 'catalog' | 'typeDetail'
      answers: {},      
      currentPage: 0,
      questions: QUESTIONS, // Stores the potentially shuffled order
      selectedType: null,
    };

    function quizReducer(state, action) {
      switch (action.type) {
        case 'LOAD_SAVED':
          return { questions: QUESTIONS, selectedType: null, ...action.payload };
        case 'START':
          return { ...state, status: 'quiz', currentPage: 0, answers: {}, questions: shuffleArray(QUESTIONS) };
        case 'CONTINUE':
          return { ...state, status: 'quiz' };
        case 'GO_HOME':
          return { ...state, status: 'start' };
        case 'VIEW_CATALOG':
          return { ...state, status: 'catalog' };
        case 'VIEW_TYPE_DETAIL':
          return { ...state, status: 'typeDetail', selectedType: action.payload };
        case 'ANSWER':
          return {
            ...state,
            answers: { ...state.answers, [action.payload.id]: action.payload.score }
          };
        case 'NEXT_PAGE':
          return { ...state, currentPage: state.currentPage + 1 };
        case 'PREV_PAGE':
          return { ...state, currentPage: Math.max(0, state.currentPage - 1) };
        case 'SUBMIT':
          return { ...state, status: 'result' };
        case 'RESET':
          return { status: 'start', answers: {}, currentPage: 0, questions: QUESTIONS, selectedType: null };
        default:
          return state;
      }
    }

    const QUESTIONS_PER_PAGE = 5;
    const TOTAL_PAGES = Math.ceil(QUESTIONS.length / QUESTIONS_PER_PAGE);

    // ==========================================

          try {
            const parsed = JSON.parse(saved);
            if (parsed.status !== 'result') {
              dispatch({ type: 'LOAD_SAVED', payload: parsed });
            }
          } catch (e) {
            console.error("Failed to parse saved state");
          }
        }
      }, []);

      // Auto-save (exclude results page)
      useEffect(() => {
        if (state.status !== 'result') {
          localStorage.setItem('mbti_progress', JSON.stringify(state));
        } else {
          localStorage.removeItem('mbti_progress');
        }
      }, [state]);

      // Calculate logic
      const results = useMemo(() => {
        if (state.status !== 'result') return null;

        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
        
        // We use the original QUESTIONS to calculate regardless of shuffle order
        QUESTIONS.forEach(q => {
          const ans = state.answers[q.id] || 3; 
          const valPositive = ans;
          const valNegative = 6 - ans;

          if (q.dim === 'EI') {
            if (q.dir === 1) { scores.E += valPositive; scores.I += valNegative; }
            else { scores.I += valPositive; scores.E += valNegative; }
          } else if (q.dim === 'SN') {
            if (q.dir === 1) { scores.S += valPositive; scores.N += valNegative; }
            else { scores.N += valPositive; scores.S += valNegative; }
          } else if (q.dim === 'TF') {
            if (q.dir === 1) { scores.T += valPositive; scores.F += valNegative; }
            else { scores.F += valPositive; scores.T += valNegative; }
          } else if (q.dim === 'JP') {
            if (q.dir === 1) { scores.J += valPositive; scores.P += valNegative; }
            else { scores.P += valPositive; scores.J += valNegative; }
          }
        });

        const getPct = (a, b) => Math.round((a / (a + b)) * 100);

        const percentages = {
          E: getPct(scores.E, scores.I),
          S: getPct(scores.S, scores.N),
          T: getPct(scores.T, scores.F),
          J: getPct(scores.J, scores.P),
        };

        const typeCode = `${percentages.E >= 50 ? 'E' : 'I'}${percentages.S >= 50 ? 'S' : 'N'}${percentages.T >= 50 ? 'T' : 'F'}${percentages.J >= 50 ? 'J' : 'P'}`;
        
        return {
          type: typeCode,
          data: PERSONALITIES[typeCode],
          pct: percentages
        };
      }, [state.status, state.answers]);

              <div className="flex flex-col gap-4 items-center">

                </div>
              </div>

              {/* Questions List */}
              <div className="space-y-6">
                {currentQuestions.map((q, idx) => (
                  <div 
                    key={q.id} 
                    className="bg-white rounded-3xl p-6 sm:p-8 shadow-sm border border-slate-200 animate-in slide-in-from-right-8 duration-500 fill-mode-both"
                    style={{ animationDelay: `${idx * 100}ms` }}
                  >
                    <h3 className="text-lg sm:text-xl font-bold mb-6 text-slate-800 leading-snug">
                      <span className="text-indigo-300 mr-2 text-sm">Q.</span>
                      {q.text}
                    </h3>
                    <RatingScale 
                      value={state.answers[q.id]} 
                      onChange={(score) => dispatch({ type: 'ANSWER', payload: { id: q.id, score } })} 
                    />
                  </div>
                ))}
              </div>

              {/* Bottom Navigation */}
              <div className="mt-8 flex justify-between items-center bg-white/50 backdrop-blur rounded-2xl p-4 border border-slate-200">
                <button
                  onClick={() => dispatch({ type: 'PREV_PAGE' })}
                  disabled={isFirstPage}
                  className={`flex items-center gap-2 px-5 py-3 rounded-xl font-medium transition-all ${
                    isFirstPage 
                      ? 'opacity-30 cursor-not-allowed' 
                      : 'bg-white text-slate-700 hover:shadow-md active:scale-95'
                  }`}
                >
                  <ChevronLeft className="w-5 h-5" /> 上一頁
                </button>
                
                <div className="text-sm font-medium text-slate-500 hidden sm:block">
                  頁面 {state.currentPage + 1} / {TOTAL_PAGES}
                </div>

                {isLastPage ? (
                  <button
                    onClick={() => {
                      window.scrollTo({ top: 0, behavior: 'smooth' });
                      dispatch({ type: 'SUBMIT' });
                    }}
                    disabled={!allAnsweredOnPage}
                    className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold text-white transition-all ${
                      allAnsweredOnPage 
                        ? 'bg-gradient-to-r from-emerald-500 to-teal-500 hover:shadow-lg active:scale-95' 
                        : 'bg-slate-300 cursor-not-allowed'
                    }`}
                  >
                    看結果 <Sparkles className="w-5 h-5" />
                  </button>
                ) : (
                  <button
                    onClick={() => {
                      window.scrollTo({ top: 0, behavior: 'smooth' });
                      dispatch({ type: 'NEXT_PAGE' });
                    }}
                    disabled={!allAnsweredOnPage}
                    className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all ${
                      allAnsweredOnPage 
                        ? 'bg-indigo-600 text-white hover:bg-indigo-700 hover:shadow-lg active:scale-95' 
                        : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                    }`}
                  >
                    下一頁 <ChevronRight className="w-5 h-5" />
                  </button>
                )}
              </div>
            </div>
          </div>
        );
      }

      // --- View 3: Result Screen ---
      if (state.status === 'result' && results) {
        const { type, data, pct } = results;

        return (
          <div className="min-h-screen bg-slate-50 py-12 px-4 transition-colors duration-500">
            <div className="max-w-4xl mx-auto space-y-8">
              
              <div className="flex justify-start">
                <button onClick={() => dispatch({type: 'GO_HOME'})} className="flex items-center gap-2 text-slate-500 hover:text-indigo-600 transition-colors font-medium">
                  <HomeIcon className="w-5 h-5"/> 回首頁
                </button>
              </div>

              <div className="bg-white/80 backdrop-blur-xl rounded-3xl p-8 sm:p-12 shadow-2xl border border-white/50 text-center animate-in zoom-in-95 duration-700">
                <h2 className="text-xl sm:text-2xl text-slate-500 font-bold tracking-widest uppercase mb-2">你的性格類型是</h2>
                <div className="text-6xl sm:text-8xl font-extrabold mb-4 bg-clip-text text-transparent bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500">
                  {type}
                </div>
                <h1 className="text-3xl sm:text-4xl font-bold text-slate-800 mb-6">
                  {data.name}
                </h1>
                <p className="text-lg sm:text-xl text-slate-600 max-w-2xl mx-auto">
                  "{data.traits}"
                </p>
              </div>

              <div className="grid md:grid-cols-2 gap-8">
                <div className="bg-white rounded-3xl p-8 shadow-xl border border-slate-100 animate-in slide-in-from-right-8 duration-700 delay-150 fill-mode-both">
                  <h3 className="text-xl font-bold mb-8 flex items-center gap-2 text-slate-800">
                     <ActivityIcon /> 特質光譜分析
                  </h3>
                  <ResultBar labelLeft="外向 (E)" labelRight="內向 (I)" percentLeft={pct.E} colorClass="bg-blue-500" />
                  <ResultBar labelLeft="實感 (S)" labelRight="直覺 (N)" percentLeft={pct.S} colorClass="bg-amber-500" />
                  <ResultBar labelLeft="思考 (T)" labelRight="情感 (F)" percentLeft={pct.T} colorClass="bg-emerald-500" />
                  <ResultBar labelLeft="判斷 (J)" labelRight="感知 (P)" percentLeft={pct.J} colorClass="bg-purple-500" />
                </div>

                <div className="space-y-8 animate-in slide-in-from-right-8 duration-700 delay-300 fill-mode-both">
                  <div className="bg-gradient-to-br from-indigo-50 to-blue-50 rounded-3xl p-8 shadow-md border border-indigo-100">
                    <h3 className="text-lg font-bold mb-3 flex items-center gap-2 text-indigo-800">
                      <Compass className="w-5 h-5" /> 適合職涯發展
                    </h3>
                    <p className="text-slate-700 leading-relaxed font-medium">
                      {data.career}
                    </p>
                  </div>
                  <div className="bg-gradient-to-br from-rose-50 to-orange-50 rounded-3xl p-8 shadow-md border border-rose-100">
                    <h3 className="text-lg font-bold mb-3 flex items-center gap-2 text-rose-800">
                      <Target className="w-5 h-5" /> 發展警示與建議
                    </h3>
                    <p className="text-slate-700 leading-relaxed font-medium">
                      {data.warning}
                    </p>
                  </div>
                </div>
              </div>

              <div className="flex justify-center gap-4 pt-8 animate-in zoom-in-95 duration-1000 delay-500 fill-mode-both">
                <button
                  onClick={() => dispatch({ type: 'START' })}
                  className="inline-flex items-center gap-2 px-8 py-4 rounded-xl font-bold bg-indigo-600 text-white shadow-lg hover:bg-indigo-700 active:scale-95 transition-all"
                >
                  <RotateCcw className="w-5 h-5" /> 重新測驗
                </button>
              </div>

            </div>
          </div>
        );
      }

      // --- View 4: Personality Types Catalog ---
      if (state.status === 'catalog') {
        return (
          <div className="min-h-screen bg-slate-50 py-8 px-4 transition-colors duration-500">
            <div className="max-w-4xl mx-auto space-y-8">
              
              <button onClick={() => dispatch({type: 'GO_HOME'})} className="flex items-center gap-2 text-slate-500 hover:text-indigo-600 transition-colors font-medium">
                <HomeIcon className="w-5 h-5"/> 回首頁
              </button>

              <h2 className="text-3xl sm:text-4xl font-extrabold text-center text-slate-800 mb-8 animate-in slide-in-from-bottom-4 duration-500">16型人格總覽</h2>
              
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 sm:gap-6">
                {Object.entries(PERSONALITIES).map(([key, data], idx) => (
                  <button 
                    key={key}
                    onClick={() => dispatch({type: 'VIEW_TYPE_DETAIL', payload: key})}
                    className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 hover:border-indigo-400 hover:shadow-lg transition-all text-center group active:scale-95 animate-in zoom-in-95 fill-mode-both"
                    style={{ animationDelay: `${idx * 50}ms` }}
                  >
                    <div className="text-2xl font-black text-indigo-600 group-hover:scale-110 transition-transform">{key}</div>
                    <div className="text-sm font-medium text-slate-600 mt-2">{data.name}</div>
                  </button>
                ))}
              </div>
            </div>
          </div>
        );
      }

      // --- View 5: Personality Type Detail ---
      if (state.status === 'typeDetail' && state.selectedType) {
        const typeCode = state.selectedType;
        const data = PERSONALITIES[typeCode];
        return (
          <div className="min-h-screen bg-slate-50 py-8 px-4 transition-colors duration-500">
            <div className="max-w-4xl mx-auto space-y-8">
              
              <div className="flex gap-6 mb-4">
                <button onClick={() => dispatch({type: 'VIEW_CATALOG'})} className="flex items-center gap-2 text-slate-500 hover:text-indigo-600 transition-colors font-medium">
                  <ArrowLeft className="w-5 h-5"/> 返回列表
                </button>
                <button onClick={() => dispatch({type: 'GO_HOME'})} className="flex items-center gap-2 text-slate-500 hover:text-indigo-600 transition-colors font-medium">
                  <HomeIcon className="w-5 h-5"/> 回首頁
                </button>
              </div>

              {/* 頂部 Hero 區塊 */}
              <div className="bg-white rounded-3xl p-8 sm:p-12 shadow-xl border border-slate-100 animate-in zoom-in-95 duration-500 relative overflow-hidden">
                <div className="absolute top-0 right-0 p-8 opacity-5 pointer-events-none select-none text-9xl font-black">
                  {typeCode}
                </div>
                
                <div className="text-center relative z-10 mb-10">
                  <h2 className="text-xl sm:text-2xl text-indigo-500 font-bold tracking-widest uppercase mb-2">{typeCode} 人格</h2>
                  <h1 className="text-4xl sm:text-6xl font-extrabold text-slate-800 mb-6">{data.name}</h1>
                  <p className="text-lg sm:text-xl text-slate-600 font-medium max-w-2xl mx-auto">
                    {data.shortDesc}
                  </p>
                </div>

                {/* 名言佳句區塊 */}
                <div className="bg-slate-50 rounded-2xl p-8 sm:p-10 mb-10 text-center relative max-w-3xl mx-auto border border-slate-100">
                  <div className="text-6xl text-indigo-200 absolute -top-2 left-4 font-serif leading-none">"</div>
                  <p className="text-lg sm:text-xl text-slate-700 italic relative z-10 mb-4 font-serif leading-relaxed">
                    {data.quote}
                  </p>
                  <p className="text-slate-500 font-semibold">— {data.quoteAuthor}</p>
                </div>

                {/* 詳細內容區塊 */}
                <div className="space-y-12 text-slate-700 leading-relaxed text-lg max-w-3xl mx-auto">
                  <section>
                    <p>{data.description}</p>
                  </section>
                  
                  <section>
                    <h3 className="text-2xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                      <Target className="w-6 h-6 text-indigo-500" /> 追尋使命
                    </h3>
                    <p>{data.mission}</p>
                  </section>

                  <section>
                    <h3 className="text-2xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                      <Users className="w-6 h-6 text-rose-400" /> 人際交往與自我呵護
                    </h3>
                    <p>{data.relationships}</p>
                  </section>
                </div>
              </div>

              {/* 職涯與警示 (原有的兩格設計保留並優化) */}
              <div className="grid md:grid-cols-2 gap-8 animate-in slide-in-from-bottom-8 duration-700 delay-150 fill-mode-both">
                <div className="bg-gradient-to-br from-indigo-50 to-blue-50 rounded-3xl p-8 shadow-md border border-indigo-100">
                  <h3 className="text-lg font-bold mb-3 flex items-center gap-2 text-indigo-800">
                    <Compass className="w-5 h-5" /> 適合職涯發展
                  </h3>
                  <p className="text-slate-700 leading-relaxed font-medium">
                    {data.career}
                  </p>
                </div>

                <div className="bg-gradient-to-br from-rose-50 to-orange-50 rounded-3xl p-8 shadow-md border border-rose-100">
                  <h3 className="text-lg font-bold mb-3 flex items-center gap-2 text-rose-800">
                    <AlertCircle className="w-5 h-5" /> 發展警示與建議
                  </h3>
                  <p className="text-slate-700 leading-relaxed font-medium">
                    {data.warning}
                  </p>
                </div>
              </div>

              {/* 底部行動呼籲 (CTA) */}
              <div className="mt-12 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-3xl p-8 sm:p-12 text-center text-white shadow-2xl relative overflow-hidden animate-in zoom-in-95 duration-1000 delay-300 fill-mode-both">
                <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
                <div className="relative z-10">
                  <h3 className="text-2xl sm:text-3xl font-bold mb-4">職場變革新起點，釋放你的無限潛力</h3>
                  <p className="text-indigo-100 mb-8 max-w-2xl mx-auto text-lg">
                    別再在職場上與自己的天性對抗。找到真正懂你思維方式的職涯指引，讓你看到全新改變。我們的進階職涯套組能協助你發掘最適合自己的職缺，善用你的獨特優勢，打造理想人生。
                  </p>
                  <button 
                    onClick={() => {
                      window.scrollTo({ top: 0, behavior: 'smooth' });
                      dispatch({ type: 'START' });
                    }} 
                    className="bg-white text-indigo-600 font-bold text-lg py-4 px-10 rounded-full shadow-lg hover:scale-105 hover:shadow-indigo-500/50 transition-all active:scale-95"
                  >
                    立刻體驗測驗
                  </button>
                </div>
              </div>

            </div>
          </div>
        );
      }

      return null;
    }

    function ActivityIcon() {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="lucide lucide-activity">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      );
    }

    // Render the React app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
